; =============================================================
;  SwimTrack — PlatformIO build configuration
;  Board : LOLIN S2 Mini (ESP32-S2)
; =============================================================

[env:lolin_s2_mini]
platform      = espressif32
board         = lolin_s2_mini
framework     = arduino

; ESP32-S2 uses native USB CDC for Serial.
; ARDUINO_USB_MODE is already defined by the board — do NOT redefine it here.
; ARDUINO_USB_CDC_ON_BOOT=1 maps the Serial object to the USB CDC port.
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1

monitor_speed = 115200

lib_deps =
    ArduinoJson
    LittleFS